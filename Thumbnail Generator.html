<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Thumbnail Generator - Dark Mode Fixed</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#151e2e',
                900: '#0f172a',
                950: '#020617',
              }
            }
          }
        }
      }
    </script>
    
    <!-- Google Fonts (Padauk for Myanmar Text) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Dark Mode Init Script (Prevents Flash) -->
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', 'Padauk', sans-serif; }
        
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark textarea::-webkit-scrollbar-thumb { background: #334155; }
        
        .loader {
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top: 2px solid currentColor;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        .dark .loader { border-color: rgba(255,255,255,0.1); border-top-color: #38bdf8; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .ad-placeholder {
            background: #f8fafc;
            border: 1px dashed #e2e8f0;
            text-align: center;
            color: #94a3b8;
            font-size: 0.7rem;
            border-radius: 12px;
        }
        .dark .ad-placeholder { background: #0f172a; border-color: #334155; color: #475569; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-6">

        <!-- Fullscreen Preview Modal -->
        <div id="previewModal" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md hidden items-center justify-center p-4" onclick="closePreview()">
            <div class="relative w-full max-w-5xl flex flex-col items-center gap-4" onclick="event.stopPropagation()">
                <img id="modalImage" src="" alt="Full Preview" class="max-w-full max-h-[80vh] object-contain shadow-2xl rounded-2xl border border-white/10">
                <div class="flex gap-3">
                    <button onclick="downloadImage()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold flex items-center gap-2 hover:bg-blue-700 transition-all">
                        <i data-lucide="download" class="w-4 h-4"></i> Download
                    </button>
                    <button onclick="closePreview()" class="bg-white/10 hover:bg-white/20 text-white px-6 py-2.5 rounded-full font-bold transition-all border border-white/10">
                        Close
                    </button>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="mb-6 border-b border-slate-200 dark:border-slate-800 pb-5">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-slate-900 dark:text-white tracking-tight leading-tight">
                        Thumbnail <span class="text-blue-600 dark:text-blue-400">AI Studio</span>
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs font-medium mt-1">
                        Professional YouTube thumbnails powered by Imagen 4.0
                    </p>
                </div>
                <div class="hidden sm:flex items-center gap-2">
                    <span class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-[10px] font-black px-3 py-1 rounded-full border border-blue-100 dark:border-blue-800 uppercase tracking-widest">
                        ULTRA HD
                    </span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sidebar: Controls -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- API & Model Config -->
                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 space-y-4">
                    <div class="flex items-center gap-2 font-bold text-slate-900 dark:text-white">
                        <i data-lucide="settings" class="w-4 h-4 text-blue-500"></i>
                        <h2 class="text-sm uppercase tracking-wider">Configuration</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <!-- API Key -->
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="key" class="w-3.5 h-3.5"></i>
                            </div>
                            <input type="password" id="apiKey" placeholder="Paste Gemini API Key" 
                                class="w-full pl-9 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 text-xs rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all font-mono">
                            <button onclick="toggleApiKey()" class="absolute right-3 top-3 text-[10px] font-black text-slate-400 hover:text-blue-500 uppercase">Show</button>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">AI Engine</label>
                                <select id="aiModel" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 text-xs rounded-xl px-3 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none">
                                    <option value="flash">Flash (Fast)</option>
                                    <option value="pro">Pro (Detail)</option>
                                </select>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Aspect Ratio</label>
                                <select id="aspectRatio" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 text-xs rounded-xl px-3 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none">
                                    <option value="16:9">16:9 Video</option>
                                    <option value="9:16">9:16 Shorts</option>
                                    <option value="1:1">1:1 Square</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Generation Input -->
                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 space-y-5">
                    <!-- Mode Switch -->
                    <div class="flex bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl">
                        <button onclick="setMode('prompt')" id="btn-prompt" class="flex-1 py-2 px-3 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm">
                            <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Prompt
                        </button>
                        <button onclick="setMode('transcript')" id="btn-transcript" class="flex-1 py-2 px-3 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                            <i data-lucide="file-text" class="w-3.5 h-3.5"></i> Transcript
                        </button>
                    </div>

                    <textarea id="inputText" placeholder="Describe your image idea..." 
                        class="w-full h-32 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-4 text-sm text-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-blue-500 outline-none leading-relaxed transition-all"></textarea>

                    <div class="pt-2 border-t border-slate-50 dark:border-slate-800">
                        <div class="flex items-center justify-between mb-3">
                            <label class="flex items-center gap-2 text-xs font-black text-slate-700 dark:text-slate-300 cursor-pointer select-none">
                                <input type="checkbox" id="includeText" checked onchange="toggleOverlayInput()" class="rounded border-slate-300 dark:border-slate-700 text-blue-600 focus:ring-blue-500 w-4 h-4">
                                <span>Text Overlay</span>
                            </label>
                        </div>
                        <input type="text" id="overlayText" placeholder="Headline text (Auto-detects)" 
                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-slate-700 dark:text-slate-200 disabled:opacity-40 transition-all">
                    </div>

                    <button onclick="handleGenerate()" id="generateBtn" 
                        class="w-full py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-3 transition-all transform active:scale-[0.98] bg-slate-900 dark:bg-blue-600 text-white hover:bg-slate-800 dark:hover:bg-blue-500 shadow-xl shadow-blue-500/10 dark:shadow-none">
                        <span id="btnText">CREATE THUMBNAIL</span>
                        <div id="btnLoader" class="loader hidden"></div>
                    </button>
                    
                    <p id="errorMsg" class="text-[10px] text-red-500 bg-red-50 dark:bg-red-900/20 p-3 rounded-xl border border-red-100 dark:border-red-900/30 hidden fade-in"></p>
                </div>

                <!-- Sidebar Ad -->
                <div class="ad-placeholder h-40 flex items-center justify-center uppercase font-black tracking-widest opacity-50">
                    Sidebar Ad
                </div>
            </div>

            <!-- Preview Area -->
            <div class="lg:col-span-8 space-y-6">
                
                <!-- Top Banner Ad -->
                <div class="ad-placeholder h-20 flex items-center justify-center uppercase font-black tracking-widest opacity-50">
                    Leaderboard Banner Ad
                </div>

                <div class="bg-white dark:bg-slate-900 rounded-[32px] p-4 shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center">
                    
                    <div id="canvasWrapper" class="relative w-full aspect-video bg-slate-50 dark:bg-slate-950 rounded-2xl overflow-hidden group border border-slate-100 dark:border-slate-800 flex items-center justify-center transition-all duration-500 shadow-inner">
                        
                        <!-- Canvas is hidden during process -->
                        <canvas id="mainCanvas" class="hidden"></canvas>
                        
                        <!-- Visible Output Image -->
                        <img id="previewImage" src="" alt="Generated" class="hidden w-full h-full object-contain fade-in">
                        
                        <!-- Initial State -->
                        <div id="emptyState" class="text-center space-y-3">
                            <div class="w-20 h-20 bg-white dark:bg-slate-900 rounded-full flex items-center justify-center mx-auto shadow-sm border border-slate-100 dark:border-slate-800">
                                <i data-lucide="image" class="w-8 h-8 text-slate-200 dark:text-slate-700"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-400 dark:text-slate-600">Canvas Ready</p>
                                <p class="text-[10px] text-slate-300 dark:text-slate-700 uppercase tracking-widest mt-1">Waiting for prompt</p>
                            </div>
                        </div>

                        <!-- Hover UI -->
                        <div id="hoverActions" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-500 flex items-center justify-center gap-4 backdrop-blur-sm hidden">
                            <button onclick="openPreview()" class="bg-white/20 hover:bg-white text-white hover:text-slate-900 p-3 rounded-2xl backdrop-blur-md transition-all border border-white/20 shadow-xl transform translate-y-4 group-hover:translate-y-0 duration-500">
                                <i data-lucide="maximize-2" class="w-6 h-6"></i>
                            </button>
                            <button onclick="downloadImage()" class="bg-white text-slate-900 px-8 py-3 rounded-2xl font-black shadow-2xl flex items-center gap-2 hover:scale-105 transition-all transform translate-y-4 group-hover:translate-y-0 duration-500 text-sm">
                                <i data-lucide="download" class="w-4 h-4"></i> DOWNLOAD PNG
                            </button>
                        </div>

                        <!-- Processing Overlay -->
                        <div id="loadingOverlay" class="absolute inset-0 bg-white/90 dark:bg-slate-950/90 backdrop-blur-md flex items-center justify-center z-50 hidden fade-in">
                            <div class="text-center space-y-4">
                                <div class="loader w-10 h-10 mx-auto border-[3px] text-blue-600"></div>
                                <div>
                                    <p id="statusText" class="text-xs font-black text-slate-800 dark:text-white uppercase tracking-widest">AI Painting...</p>
                                    <div class="w-32 h-1 bg-slate-100 dark:bg-slate-800 rounded-full mt-3 overflow-hidden mx-auto">
                                        <div id="loadingBar" class="h-full bg-blue-600 w-0 transition-all duration-1000"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                    
                    <div id="resultInfo" class="w-full mt-4 flex items-center justify-between px-2 hidden">
                        <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase">
                            <i data-lucide="check-circle" class="w-3 h-3 text-green-500"></i>
                            <span>Generation Complete</span>
                        </div>
                        <div id="sizeInfo" class="text-[10px] font-black text-slate-400">1280 x 720</div>
                    </div>
                </div>

                <!-- Footer Ad -->
                <div class="ad-placeholder h-32 flex items-center justify-center uppercase font-black tracking-widest opacity-50">
                    Footer Content Ad
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentMode = 'prompt';
        let generatedDataUrl = null;

        const apiKeyInput = document.getElementById('apiKey');
        const inputText = document.getElementById('inputText');
        const aiModelSelect = document.getElementById('aiModel');
        const aspectRatioSelect = document.getElementById('aspectRatio');
        const includeTextCheck = document.getElementById('includeText');
        const overlayTextInput = document.getElementById('overlayText');
        
        const previewImage = document.getElementById('previewImage');
        const emptyState = document.getElementById('emptyState');
        const hoverActions = document.getElementById('hoverActions');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusText = document.getElementById('statusText');
        const loadingBar = document.getElementById('loadingBar');
        const errorMsg = document.getElementById('errorMsg');
        const btnLoader = document.getElementById('btnLoader');
        const generateBtn = document.getElementById('generateBtn');

        // Initial Key Load
        window.onload = () => {
            const savedKey = localStorage.getItem('google_ai_key');
            if(savedKey) apiKeyInput.value = savedKey;
            updateCanvasRatio();
        };

        function toggleApiKey() {
            apiKeyInput.type = apiKeyInput.type === 'password' ? 'text' : 'password';
        }

        function setMode(mode) {
            currentMode = mode;
            const isPrompt = mode === 'prompt';
            document.getElementById('btn-prompt').className = isPrompt ? "flex-1 py-2 px-3 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm" : "flex-1 py-2 px-3 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200";
            document.getElementById('btn-transcript').className = !isPrompt ? "flex-1 py-2 px-3 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm" : "flex-1 py-2 px-3 rounded-xl text-xs font-bold transition-all duration-300 flex items-center justify-center gap-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200";
            
            inputText.placeholder = isPrompt ? "Describe your image idea..." : "Paste video transcript to extract visual context...";
            overlayTextInput.disabled = !isPrompt;
            if(!isPrompt) overlayTextInput.value = "";
        }

        function updateCanvasRatio() {
            const wrapper = document.getElementById('canvasWrapper');
            const ratio = aspectRatioSelect.value;
            wrapper.style.aspectRatio = ratio.replace(':', '/');
            document.getElementById('sizeInfo').innerText = ratio === '16:9' ? '1280 x 720' : (ratio === '1:1' ? '1080 x 1080' : '720 x 1280');
        }

        aspectRatioSelect.onchange = updateCanvasRatio;

        async function fetchWithRetry(url, options, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status === 429) await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
            }
            throw new Error("Connection failed after retries.");
        }

        async function generateMetadata(text, mode, apiKey) {
            statusText.innerText = 'Analyzing Context...';
            loadingBar.style.width = '30%';
            const modelName = 'gemini-2.5-flash-preview-09-2025';

            const prompt = mode === 'transcript' 
                ? `Analyze this transcript: "${text}". Output JSON: {"title": "Burmese clickbait title", "visualPrompt": "English image description for thumbnail"}`
                : `Based on: "${text}", suggest a short Burmese YouTube title. JSON: {"title": "..."}`;

            const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await res.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        async function generateImage(prompt, apiKey, ratio) {
            statusText.innerText = 'AI Painting Pixels...';
            loadingBar.style.width = '60%';
            const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: [{ prompt: `${prompt}, high resolution, cinematic lighting, 4k, digital art style, vibrant colors` }],
                    parameters: { sampleCount: 1, aspectRatio: ratio }
                })
            });
            const data = await res.json();
            if(!data.predictions) throw new Error(data.error?.message || "Generation Error");
            return data.predictions[0].bytesBase64Encoded;
        }

        async function handleGenerate() {
            const key = apiKeyInput.value.trim();
            const text = inputText.value.trim();
            if(!key || !text) { showError("Enter API Key and Prompt first."); return; }

            localStorage.setItem('google_ai_key', key);
            startLoading();

            try {
                const ratio = aspectRatioSelect.value;
                let finalPrompt = text;
                let finalTitle = overlayTextInput.value;

                if (currentMode === 'transcript' || (!finalTitle && includeTextCheck.checked)) {
                    const meta = await generateMetadata(text, currentMode, key);
                    if(currentMode === 'transcript') finalPrompt = meta.visualPrompt;
                    finalTitle = meta.title;
                    overlayTextInput.value = finalTitle;
                }

                const base64 = await generateImage(finalPrompt, key, ratio);
                await composeThumbnail(base64, finalTitle, ratio);
                
                showResult();
            } catch (err) {
                showError(err.message);
            } finally {
                stopLoading();
            }
        }

        async function composeThumbnail(b64, title, ratio) {
            statusText.innerText = 'Finalizing Composition...';
            loadingBar.style.width = '90%';
            
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const dims = ratio === '16:9' ? {w:1280, h:720} : (ratio === '1:1' ? {w:1080, h:1080} : {w:720, h:1280});
            canvas.width = dims.w; canvas.height = dims.h;

            return new Promise((resolve) => {
                const img = new Image();
                img.src = `data:image/png;base64,${b64}`;
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, dims.w, dims.h);

                    if(includeTextCheck.checked && title) {
                        // Text Background Gradient
                        const grad = ctx.createLinearGradient(0, dims.h * 0.6, 0, dims.h);
                        grad.addColorStop(0, "rgba(0,0,0,0)");
                        grad.addColorStop(1, "rgba(0,0,0,0.8)");
                        ctx.fillStyle = grad;
                        ctx.fillRect(0, dims.h * 0.5, dims.w, dims.h * 0.5);

                        // Text Styling
                        const fontSize = dims.w * 0.07;
                        ctx.font = `bold ${fontSize}px "Padauk", sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.fillStyle = 'white';
                        ctx.strokeStyle = 'black';
                        ctx.lineWidth = fontSize * 0.15;
                        ctx.lineJoin = 'round';
                        ctx.shadowColor = 'rgba(0,0,0,0.5)';
                        ctx.shadowBlur = 20;

                        const words = title.split(' ');
                        let lines = []; let cur = "";
                        words.forEach(w => {
                            if(ctx.measureText(cur + w).width < dims.w * 0.8) cur += w + " ";
                            else { lines.push(cur.trim()); cur = w + " "; }
                        });
                        lines.push(cur.trim());

                        const startY = dims.h - (lines.length * fontSize * 1.2) - (dims.h * 0.05);
                        lines.forEach((l, i) => {
                            const y = startY + (i * fontSize * 1.2);
                            ctx.strokeText(l, dims.w/2, y);
                            ctx.fillText(l, dims.w/2, y);
                        });
                    }
                    generatedDataUrl = canvas.toDataURL('image/png');
                    previewImage.src = generatedDataUrl;
                    resolve();
                };
            });
        }

        function startLoading() {
            loadingOverlay.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            generateBtn.disabled = true;
            loadingBar.style.width = '10%';
        }

        function stopLoading() {
            loadingOverlay.classList.add('hidden');
            btnLoader.classList.add('hidden');
            generateBtn.disabled = false;
        }

        function showResult() {
            emptyState.classList.add('hidden');
            previewImage.classList.remove('hidden');
            hoverActions.classList.remove('hidden');
            document.getElementById('resultInfo').classList.remove('hidden');
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }

        function openPreview() {
            document.getElementById('modalImage').src = generatedDataUrl;
            document.getElementById('previewModal').classList.remove('hidden');
            document.getElementById('previewModal').classList.add('flex');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
        }

        function downloadImage() {
            const a = document.createElement('a');
            a.href = generatedDataUrl;
            a.download = `AI-Thumbnail-${Date.now()}.png`;
            a.click();
        }
    </script>
</body>
</html>
